<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./mate.jpg">
    <title>MateNews</title>
    <style>
        :root {
            color-scheme: light;
            --page-max-width: 800px;
            --page-padding: 7%;
            --surface: rgba(255, 255, 255, 0.96);
            --line: rgba(0, 0, 0, 0.14);
            --shadow: rgba(0, 0, 0, 0.08);
            --highlight: #ffd1003d;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            max-width: var(--page-max-width);
            margin: 0 auto;
            padding: 24px var(--page-padding) 40px;
            font-size: 18px;
        }

        .page-content {
            position: relative;
        }

        .source-section {
            margin-bottom: 28px;
            scroll-margin-top: 26px;
        }

        .source-heading {
            margin-bottom: 14px;
        }

        .source-notes {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nota {
            margin-bottom: 10px;
        }

        :link, a:visited {
            color: black;
            text-decoration: none;
        }

        a:visited {
            color: black;
        }
        a:hover {
            background: var(--highlight);
        }
        a:active {
            color: black;
        }

        .tocLink:hover {
            text-decoration-thickness: 1px;
            text-underline-offset: 0.18em;
        }

        .btnL {
            background: #d1d1d1;
            border-radius: 7px;
            padding: 18px;
            min-width: 100%;
            color: #000000;
            font-size: 18px;
            min-height: 70px;
            border: none;
            cursor: pointer;
        }

        #tocToggle {
            position: fixed;
            top: 20px;
            left: 16px;
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            background: var(--surface);
            border: 1px solid var(--line);
            cursor: pointer;

            z-index: 1100;
        }

        .tocToggleLines {
            display: grid;
            gap: 4px;
        }

        .tocToggleLines span {
            display: block;
            width: 14px;
            height: 1px;
            background: #111111;
            opacity: 1;
        }

        #tocSidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: min(17rem, 82vw);
            height: 100vh;
            padding: 72px 16px 24px;
            box-sizing: border-box;
            background: var(--surface);
            backdrop-filter: blur(12px);
            transform: translateX(calc(-100% - 14px));
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            overflow-y: auto;
            z-index: 1050;
        }

        body.toc-open #tocSidebar {
            transform: translateX(0);
        }

        #tocBackdrop {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.36);
            backdrop-filter: blur(1px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 1040;
        }

        body.toc-open #tocBackdrop {
            opacity: 0;
            pointer-events: auto;
        }

        .tocTitle {
            margin: 0 0 18px;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 1;
        }

        .tocList {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 8px;
        }

        .tocLink {
            display: block;
            padding: 6px 0;
        }

        .tocEmpty {
            margin: 0;
            font-size: 0.95rem;
            opacity: 1;
        }

        #fullscreenButton {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            background: var(--surface);
            border: 1px solid var(--line);
            cursor: pointer;
            border-radius: 0;
            z-index: 1100;
        }

        #fullscreenIcon {
            width: 24px;
            height: 24px;
            opacity: 0.8;
        }

        #tocToggle:focus-visible,
        #fullscreenButton:focus-visible,
        .btnL:focus-visible,
        .tocLink:focus-visible {
            outline: 1px solid black;
            outline-offset: 2px;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 640px) {
            body {
                padding-right: 5%;
                padding-left: 5%;
            }

            #tocToggle {
                left: 12px;
            }

            #fullscreenButton {
                right: 12px;
            }

            #tocSidebar {
                width: min(18rem, 88vw);
            }
        }

        @media (min-width: 1100px) {
            #tocSidebar {
                top: 18px;
                left: 18px;
                height: calc(100vh - 36px);
                transform: translateX(calc(-100% - 18px));
            }


            #tocBackdrop {
                background: rgba(255, 255, 255, 0.22);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            html {
                scroll-behavior: auto;
            }

            * {
                transition: none !important;
            }
        }

    </style>
</head>
<body>
    <main id="mainContent" class="page-content">
        <br>
        <br>
        <h1>MateNews</h1>
        <p>__FECHA__ __HORA__ hs</p>
        <br>

        <div id="sourceIndex" aria-label="Listado principal de noticias por fuente">
__SECCIONES__
        </div>

        <br>
        <button class="btnL" onclick="window.location.href='__LAST_PREV__'">Edición anterior</button>

        <br>
    </main>

    <button id="tocToggle" aria-expanded="false" aria-controls="tocSidebar" aria-label="Abrir tabla de contenidos">
        <span class="tocToggleLines" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
        </span>
        <br>
        <span class="sr-only">Fuentes</span>
    </button>

    <aside id="tocSidebar" aria-hidden="true">
        <p class="tocTitle">Fuentes</p>
        <nav aria-label="Tabla de contenidos por fuente">
            <ul id="tocList" class="tocList"></ul>
            <p id="tocEmpty" class="tocEmpty" hidden>No hay fuentes visibles.</p>
        </nav>
    </aside>
    <div id="tocBackdrop" hidden></div>

    <button id="fullscreenButton" aria-label="Alternar pantalla completa">
    <svg id="fullscreenIcon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M5 5h5v5H5zM14 5h5v5h-5zM5 14h5v5H5zM14 14h5v5h-5z"/>
    </svg>
    </button>


    <script>
        var elem = document.documentElement;
        var fullscreenButton = document.getElementById("fullscreenButton");
        var fullscreenIcon = document.getElementById("fullscreenIcon");
        var tocToggle = document.getElementById("tocToggle");
        var tocSidebar = document.getElementById("tocSidebar");
        var tocBackdrop = document.getElementById("tocBackdrop");
        var tocList = document.getElementById("tocList");
        var tocEmpty = document.getElementById("tocEmpty");
        var sourceIndex = document.getElementById("sourceIndex");

        function slugifyHeading(text, usedIds) {
            var base = (text || "fuente")
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-z0-9]+/g, "-")
                .replace(/^-+|-+$/g, "") || "fuente";
            var candidate = "source-" + base;
            var suffix = 2;
            while (usedIds.has(candidate)) {
                candidate = "source-" + base + "-" + suffix;
                suffix += 1;
            }
            usedIds.add(candidate);
            return candidate;
        }

        function closeToc() {
            document.body.classList.remove("toc-open");
            tocToggle.setAttribute("aria-expanded", "false");
            tocSidebar.setAttribute("aria-hidden", "true");
            tocBackdrop.hidden = true;
        }

        function openToc() {
            document.body.classList.add("toc-open");
            tocToggle.setAttribute("aria-expanded", "true");
            tocSidebar.setAttribute("aria-hidden", "false");
            tocBackdrop.hidden = false;
        }

        function toggleToc() {
            if (document.body.classList.contains("toc-open")) {
                closeToc();
            } else {
                openToc();
            }
        }

        function buildToc() {
            if (!sourceIndex) {
                tocEmpty.hidden = false;
                return;
            }

            var usedIds = new Set();
            var headings = Array.from(sourceIndex.querySelectorAll("h3"));
            if (!headings.length) {
                tocEmpty.hidden = false;
                return;
            }

            headings.forEach(function(heading) {
                var target = heading.closest(".source-section") || heading;
                if (!target.id) {
                    target.id = slugifyHeading(heading.textContent, usedIds);
                } else {
                    usedIds.add(target.id);
                }

                var item = document.createElement("li");
                var link = document.createElement("a");
                link.className = "tocLink";
                link.href = "#" + target.id;
                link.textContent = heading.textContent.trim();
                link.addEventListener("click", closeToc);
                item.appendChild(link);
                tocList.appendChild(item);
            });

            tocEmpty.hidden = true;
        }

        buildToc();

        tocToggle.addEventListener("click", toggleToc);
        tocBackdrop.addEventListener("click", closeToc);

        document.addEventListener("keydown", function(event) {
            if (event.key === "Escape" && document.body.classList.contains("toc-open")) {
                closeToc();
            }
        });

        fullscreenButton.addEventListener("click", function() {
        if (document.fullscreenElement || document.mozFullScreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
            if (document.exitFullscreen) {
            document.exitFullscreen();
            } else if (document.mozCancelFullScreen) { /* Firefox */
            document.mozCancelFullScreen();
            } else if (document.webkitExitFullscreen) { /* Chrome, Safari and Opera */
            document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) { /* IE/Edge */
            document.msExitFullscreen();
            }
        } else {
            if (elem.requestFullscreen) {
            elem.requestFullscreen();
            } else if (elem.mozRequestFullScreen) { /* Firefox */
            elem.mozRequestFullScreen();
            } else if (elem.webkitRequestFullscreen) { /* Chrome, Safari and Opera */
            elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { /* IE/Edge */
            elem.msRequestFullscreen();
            }
        }
        });

        document.addEventListener('fullscreenchange', (event) => {
        if (!document.fullscreenElement) {
            fullscreenIcon.innerHTML = '<path d="M5 5h5v5H5zM14 5h5v5h-5zM5 14h5v5H5zM14 14h5v5h-5z"/>';
        } else {
            fullscreenIcon.innerHTML = '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
        }
        });
    </script>



</body>
</html>
